<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lock Screen Redesign — Apple-Style Unlock UI</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #ffffff;
  --text: #1a1a2e;
  --text-secondary: #555;
  --border: #e0e0e0;
  --sidebar-bg: #fafafa;
  --code-bg: #1e1e2e;
  --code-text: #cdd6f4;
  --blockquote-border: #4a9eff;
  --link-color: #2563eb;
  --link-hover: #1d4ed8;
  --accent: #4a9eff;
  --topbar-height: 48px;
  --sidebar-width: 260px;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif;
  color: var(--text);
  background: var(--bg);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* ── Lock Screen ──────────────────────────────── */

#lock-screen {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: #f0f2f5;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
}

.lock-card {
  background: #fff;
  border-radius: 12px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.12);
  padding: 48px 40px 36px;
  width: 380px;
  max-width: 90vw;
  text-align: center;
}

.lock-icon { margin-bottom: 16px; }

.lock-title {
  font-size: 1.25rem;
  font-weight: 600;
  margin-bottom: 8px;
  color: var(--text);
  word-break: break-word;
}

.lock-subtitle {
  color: var(--text-secondary);
  font-size: 0.9rem;
  margin-bottom: 24px;
}

.lock-card input[type="password"] {
  width: 100%;
  padding: 12px 16px;
  border: 2px solid var(--border);
  border-radius: 8px;
  font-size: 1rem;
  outline: none;
  transition: border-color 0.2s;
  margin-bottom: 12px;
  background: #fff;
}

.lock-card input[type="password"]:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(74,158,255,0.15);
}

.unlock-btn {
  width: 100%;
  padding: 12px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s;
}

.unlock-btn:hover { background: var(--link-hover); }
.unlock-btn:disabled { opacity: 0.6; cursor: not-allowed; }

.lock-error {
  color: #dc2626;
  font-size: 0.875rem;
  margin-top: 12px;
  display: none;
}

.lock-footer {
  margin-top: 20px;
  font-size: 0.75rem;
  color: #999;
  line-height: 1.5;
}

/* ── Top Bar ──────────────────────────────────── */

#top-bar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: var(--topbar-height);
  background: #fff;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 16px;
  z-index: 100;
}

#top-bar .top-title {
  font-size: 0.95rem;
  font-weight: 600;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  flex: 1;
}

.hamburger {
  display: none;
  background: none;
  border: none;
  cursor: pointer;
  padding: 6px;
  margin-right: 8px;
  border-radius: 4px;
  color: var(--text);
  flex-shrink: 0;
}

.hamburger:hover { background: #f0f0f0; }
.hamburger svg { display: block; }

/* ── Sidebar ──────────────────────────────────── */

#sidebar {
  position: fixed;
  top: var(--topbar-height);
  left: 0;
  width: var(--sidebar-width);
  height: calc(100vh - var(--topbar-height));
  overflow-y: auto;
  background: var(--sidebar-bg);
  border-right: 1px solid var(--border);
  padding: 16px 0;
  z-index: 90;
}

#sidebar .toc-header {
  font-size: 0.75rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: #999;
  padding: 0 20px 12px;
}

#toc-list { list-style: none; }
#toc-list li { margin: 0; }

.toc-link {
  display: block;
  padding: 6px 20px;
  font-size: 0.875rem;
  color: var(--text-secondary);
  text-decoration: none;
  border-left: 3px solid transparent;
  transition: all 0.15s;
  line-height: 1.4;
  word-break: break-word;
}

.toc-link:hover {
  color: var(--text);
  background: rgba(0,0,0,0.03);
}

.toc-link.active {
  color: var(--link-color);
  border-left-color: var(--link-color);
  font-weight: 600;
  background: rgba(37,99,235,0.06);
}

.toc-link.level-h3 {
  padding-left: 36px;
  font-size: 0.825rem;
}

.toc-empty {
  padding: 12px 20px;
  color: #999;
  font-size: 0.85rem;
}

/* ── Content Area ─────────────────────────────── */

#content-area {
  margin-left: var(--sidebar-width);
  margin-top: var(--topbar-height);
  padding: 40px 56px;
}

#content { max-width: none; }

/* Typography */

#content h1 {
  font-size: 2rem;
  font-weight: 700;
  margin: 0 0 16px;
  padding-bottom: 8px;
  border-bottom: 2px solid var(--border);
  line-height: 1.3;
}

#content h2 {
  font-size: 1.5rem;
  font-weight: 700;
  margin: 32px 0 12px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
  line-height: 1.3;
}

#content h3 {
  font-size: 1.2rem;
  font-weight: 600;
  margin: 24px 0 8px;
  line-height: 1.4;
}

#content p {
  margin: 0 0 16px;
  font-size: 1rem;
}

#content a {
  color: var(--link-color);
  text-decoration: none;
}

#content a:hover { text-decoration: underline; }

#content img {
  max-width: 100%;
  height: auto;
  border-radius: 8px;
  margin: 16px 0;
  display: block;
}

#content hr {
  border: none;
  border-top: 2px solid var(--border);
  margin: 32px 0;
}

#content strong { font-weight: 700; }
#content em { font-style: italic; }

/* Code Blocks */

.code-block-wrapper {
  position: relative;
  margin: 16px 0;
}

.code-block-wrapper pre {
  background: var(--code-bg);
  color: var(--code-text);
  border-radius: 8px;
  padding: 16px 48px 16px 20px;
  overflow-x: auto;
  margin: 0;
  font-size: 0.875rem;
  line-height: 1.6;
  tab-size: 2;
}

.copy-btn {
  position: absolute;
  top: 8px;
  right: 8px;
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 6px 10px;
  background: rgba(255,255,255,0.08);
  color: rgba(255,255,255,0.5);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 6px;
  cursor: pointer;
  font-size: 0.75rem;
  font-family: inherit;
  transition: all 0.2s;
  white-space: nowrap;
  -webkit-tap-highlight-color: transparent;
}

.copy-btn:hover {
  background: rgba(255,255,255,0.15);
  color: rgba(255,255,255,0.85);
  border-color: rgba(255,255,255,0.25);
}

.copy-btn:active {
  transform: scale(0.95);
}

.copy-btn.copied {
  background: rgba(34,197,94,0.2);
  border-color: rgba(34,197,94,0.4);
  color: #4ade80;
}

.copy-btn svg {
  flex-shrink: 0;
}

#content code {
  font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, Courier, monospace;
}

#content p > code,
#content li > code {
  background: #f1f5f9;
  color: #be123c;
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 0.85em;
}

#content pre code {
  background: none;
  color: inherit;
  padding: 0;
  border-radius: 0;
  font-size: inherit;
}

/* Tables */

#content table {
  width: 100%;
  border-collapse: collapse;
  margin: 16px 0;
  font-size: 0.95rem;
  overflow-x: auto;
  display: block;
}

#content th,
#content td {
  padding: 10px 14px;
  border: 1px solid var(--border);
  text-align: left;
}

#content th {
  background: #f8f9fa;
  font-weight: 600;
}

#content tr:nth-child(even) td {
  background: #f8f9fa;
}

/* Blockquotes */

#content blockquote {
  margin: 16px 0;
  padding: 12px 20px;
  border-left: 4px solid var(--blockquote-border);
  background: #f8faff;
  color: #444;
}

#content blockquote p:last-child { margin-bottom: 0; }

/* Lists */

#content ul,
#content ol {
  margin: 8px 0 16px;
  padding-left: 24px;
}

#content li {
  margin: 4px 0;
  font-size: 1rem;
}

#content li > ul,
#content li > ol {
  margin: 4px 0;
}

/* ── Footer ───────────────────────────────────── */

#footer {
  margin-left: var(--sidebar-width);
  padding: 24px 56px 40px;
  border-top: 1px solid var(--border);
  background: #fafafa;
}

.footer-info {
  max-width: none;
  font-size: 0.8rem;
  color: #999;
  line-height: 1.6;
}

.footer-info span { display: block; }

/* ── Overlay ──────────────────────────────────── */

#overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.4);
  z-index: 80;
}

#overlay.visible { display: block; }

/* ── Mobile ───────────────────────────────────── */

@media (max-width: 768px) {
  .hamburger { display: block; }

  #sidebar {
    transform: translateX(-100%);
    transition: transform 0.3s ease;
    z-index: 200;
  }

  #sidebar.open {
    transform: translateX(0);
  }

  #sidebar.open ~ #overlay { display: block; }

  #content-area {
    margin-left: 0;
    padding: 20px 16px;
  }

  #footer {
    margin-left: 0;
    padding: 16px;
  }

  #content h1 { font-size: 1.5rem; }
  #content h2 { font-size: 1.25rem; }
  #content h3 { font-size: 1.1rem; }

  .lock-card { padding: 32px 24px; }
}
</style>
</head>

/* ─── Helpers ────────────────────────────────── */

function escapeHtml(s) {
  return s.replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');
}

function slugify(text) {
  return text.toLowerCase()
    .replace(/[^\w一-鿿぀-ゟ゠-ヿ가-힯]+/g, '-')
    .replace(/^-+|-+$/g, '');
}

function base64ToBytes(b64) {
  var binary = atob(b64);
  var bytes  = new Uint8Array(binary.length);
  for (var i = 0; i < binary.length; i++) {
    bytes[i] = binary.charCodeAt(i);
  }
  return bytes;
}

/* ─── Inline Processor ───────────────────────── */

function processInline(text) {
  var s = text.replace(/&/g, '&amp;')
              .replace(/</g, '&lt;')
              .replace(/>/g, '&gt;')
              .replace(/"/g, '&quot;');

  s = s.replace(/`([^`]+)`/g,         '<code>$1</code>');
  s = s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1" loading="lazy">');
  s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g,  '<a href="$2">$1</a>');
  s = s.replace(/\*\*([^*]+)\*\*/g,   '<strong>$1</strong>');
  s = s.replace(/\*([^*]+)\*/g,       '<em>$1</em>');
  return s;
}

/* ─── Block-level Processors ─────────────────── */

function processTable(lines) {
  var headerCells = lines[0].split('|').filter(function(c){ return c.trim(); }).map(function(c){ return processInline(c.trim()); });
  var rows        = lines.slice(2);
  var html        = '<table><thead><tr>';

  for (var hi = 0; hi < headerCells.length; hi++) html += '<th>' + headerCells[hi] + '</th>';
  html += '</tr></thead><tbody>';

  for (var ri = 0; ri < rows.length; ri++) {
    if (!rows[ri].trim()) continue;
    var cells = rows[ri].split('|').filter(function(c){ return c.trim(); }).map(function(c){ return processInline(c.trim()); });
    if (cells.length === 0) continue;
    html += '<tr>';
    for (var ci = 0; ci < cells.length; ci++) html += '<td>' + cells[ci] + '</td>';
    html += '</tr>';
  }
  html += '</tbody></table>';
  return html;
}

function processList(lines) {
  var html        = '';
  var currentType = null;

  for (var i = 0; i < lines.length; i++) {
    var line     = lines[i];
    var ulMatch  = line.match(/^(\s*)[-*+]\s+(.*)/);
    var olMatch  = line.match(/^(\s*)\d+\.\s+(.*)/);

    if (ulMatch) {
      if (currentType !== 'ul') {
        if (currentType) html += '</' + currentType + '>';
        html += '<ul>';
        currentType = 'ul';
      }
      html += '<li>' + processInline(ulMatch[2]) + '</li>';
    } else if (olMatch) {
      if (currentType !== 'ol') {
        if (currentType) html += '</' + currentType + '>';
        html += '<ol>';
        currentType = 'ol';
      }
      html += '<li>' + processInline(olMatch[2]) + '</li>';
    }
  }
  if (currentType) html += '</' + currentType + '>';
  return html;
}

/* ─── Main Markdown Renderer ─────────────────── */

function markdownToHtml(md) {
  /* ---- Phase 1: extract fenced code blocks ---- */
  var codeBlocks = [];
  var text = md.replace(/```(\w*)\n?([\s\S]*?)```/g, function(m, lang, code) {
    var id = '%%CODE_' + codeBlocks.length + '%%';
    codeBlocks.push(
      '<div class="code-block-wrapper">' +
      '<pre><code' +
      (lang ? ' class="language-' + lang + '"' : '') +
      '>' + escapeHtml(code.trim()) + '</code></pre>' +
      '<button class="copy-btn" title="复制代码">' +
      '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
      '<rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>' +
      '<path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>' +
      '</svg>' +
      '<span>复制</span>' +
      '</button>' +
      '</div>'
    );
    return id;
  });

  var lines = text.split('\n');
  var html  = '';
  var i     = 0;

  function getCodeBlock(id) {
    var idx = parseInt(id.replace('%%CODE_', '').replace('%%', ''), 10);
    return codeBlocks[idx] || '';
  }

  /* ---- Phase 2: line-by-line processing ------ */
  while (i < lines.length) {
    var line     = lines[i];
    var trimmed  = line.trim();

    if (trimmed === '') { i++; continue; }

    /* -- code block placeholder -- */
    if (/^%%CODE_\d+%%$/.test(trimmed)) {
      html += getCodeBlock(trimmed) + '\n';
      i++;
      continue;
    }

    /* -- heading -- */
    if (/^#{1,3}\s/.test(line)) {
      var hLevel  = line.match(/^#+/)[0].length;
      var hText   = line.replace(/^#+\s*/, '');
      html += '<h' + hLevel + ' id="' + slugify(hText) + '">' +
              processInline(hText) + '</h' + hLevel + '>\n';
      i++;
      continue;
    }

    /* -- horizontal rule -- */
    if (/^---+$/.test(trimmed)) {
      html += '<hr>\n';
      i++;
      continue;
    }

    /* -- blockquote -- */
    if (/^>\s/.test(trimmed) || trimmed === '>') {
      var quoteLines = [];
      while (i < lines.length && /^>/.test(lines[i].trim())) {
        quoteLines.push(lines[i].trim().replace(/^>\s?/, ''));
        i++;
      }
      html += '<blockquote>' +
              markdownToHtml(quoteLines.join('\n')) +
              '</blockquote>\n';
      continue;
    }

    /* -- table -- */
    if (i + 1 < lines.length && line.includes('|')) {
      var sepLine = lines[i + 1].trim();
      var pipeCount = (sepLine.match(/\|/g) || []).length;
      if (pipeCount >= 2 && /-/.test(sepLine)) {
        var tableLines = [];
        while (i < lines.length && lines[i].includes('|')) {
          tableLines.push(lines[i]);
          i++;
        }
        html += processTable(tableLines) + '\n';
        continue;
      }
    }

    /* -- unordered list -- */
    if (/^\s*[-*+]\s/.test(line)) {
      var ulLines = [];
      i = gatherList(ulLines, lines, i);
      html += processList(ulLines) + '\n';
      continue;
    }

    /* -- ordered list -- */
    if (/^\s*\d+\.\s/.test(line)) {
      var olLines = [];
      i = gatherList(olLines, lines, i);
      html += processList(olLines) + '\n';
      continue;
    }

    /* -- paragraph -- */
    var paraLines = [];
    while (i < lines.length && lines[i].trim() !== '') {
      var l = lines[i].trim();
      if (/^#{1,3}\s/.test(l)) break;
      if (/^---+$/.test(l)) break;
      if (/^>\s/.test(l)) break;
      if (/^%%CODE_\d+%%$/.test(l)) break;
      if (/^\s*[-*+]\s/.test(l)) break;
      if (/^\s*\d+\.\s/.test(l)) break;
      if (l.includes('|') && i + 1 < lines.length) {
        var np = (lines[i + 1].trim().match(/\|/g) || []).length;
        if (np >= 2 && /-/.test(lines[i + 1].trim())) break;
      }
      paraLines.push(lines[i]);
      i++;
    }
    if (paraLines.length > 0) {
      html += '<p>' + processInline(paraLines.join(' ')) + '</p>\n';
    }
  }

  return html;
}

function gatherList(accum, lines, start) {
  var i = start;
  while (i < lines.length && lines[i].trim() !== '') {
    var l = lines[i].trim();
    if (/^#{1,3}\s/.test(l)) break;
    if (/^---+$/.test(l)) break;
    if (/^>\s/.test(l)) break;
    if (/^%%CODE_\d+%%$/.test(l)) break;
    if (l.includes('|') && i + 1 < lines.length) {
      var np = (lines[i + 1].trim().match(/\|/g) || []).length;
      if (np >= 2 && /-/.test(lines[i + 1].trim())) break;
    }
    if (!/^\s*[-*+]\s/.test(l) && !/^\s*\d+\.\s/.test(l) && l !== '') break;
    accum.push(lines[i]);
    i++;
  }
  return i;
}

/* ─── TOC Builder ────────────────────────────── */

function buildTOC(tocData) {
  var list = document.getElementById('toc-list');
  list.innerHTML = '';

  if (!tocData || tocData.length === 0) {
    var empty = document.createElement('li');
    empty.className = 'toc-empty';
    empty.textContent = '无目录';
    list.appendChild(empty);
    return;
  }

  for (var i = 0; i < tocData.length; i++) {
    var item = tocData[i];
    var li = document.createElement('li');
    var a  = document.createElement('a');
    a.href     = '#' + item.id;
    a.className = 'toc-link';
    if (item.level === 'h3') a.classList.add('level-h3');
    a.textContent = item.text;
    li.appendChild(a);
    list.appendChild(li);
  }
}

/* ─── Decryption ─────────────────────────────── */

async function decryptContent(encryptedBase64, nonceBase64, saltBase64, password) {
  var encrypted = base64ToBytes(encryptedBase64);
  var nonce     = base64ToBytes(nonceBase64);
  var salt      = base64ToBytes(saltBase64);

  var keyMaterial = await crypto.subtle.importKey(
    'raw',
    new TextEncoder().encode(password),
    'PBKDF2',
    false,
    ['deriveKey']
  );

  var key = await crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt: salt, iterations: 100000, hash: 'SHA-256' },
    keyMaterial,
    { name: 'AES-GCM', length: 256 },
    false,
    ['decrypt']
  );

  var plaintext = await crypto.subtle.decrypt(
    { name: 'AES-GCM', iv: nonce },
    key,
    encrypted
  );

  return new TextDecoder().decode(plaintext);
}

/* ─── Scroll Spy ─────────────────────────────── */

function setupScrollSpy() {
  var headings = document.querySelectorAll('#content h1, #content h2, #content h3');
  if (headings.length === 0) return;
  var links = document.querySelectorAll('.toc-link');

  function update() {
    var currentId = '';
    var scrollPos = window.scrollY + 100;
    for (var h = 0; h < headings.length; h++) {
      if (headings[h].offsetTop <= scrollPos) {
        currentId = headings[h].id;
      }
    }
    for (var l = 0; l < links.length; l++) {
      var href = links[l].getAttribute('href');
      if (href === '#' + currentId) {
        links[l].classList.add('active');
      } else {
        links[l].classList.remove('active');
      }
    }
  }

  var ticking = false;
  window.addEventListener('scroll', function() {
    if (!ticking) {
      window.requestAnimationFrame(function() {
        update();
        ticking = false;
      });
      ticking = true;
    }
  });

  setTimeout(update, 100);
}

/* ─── Render ─────────────────────────────────── */

function renderApp(mdContent) {
  var contentDiv = document.getElementById('content');
  contentDiv.innerHTML = markdownToHtml(mdContent);

  buildTOC(TOC_DATA);

  document.getElementById('lock-screen').style.display = 'none';
  document.getElementById('app').style.display = '';

  setupScrollSpy();
  setupCopyButtons();
}

/* ─── Copy Button Handler ──────────────────────── */

function setupCopyButtons() {
  var contentDiv = document.getElementById('content');
  contentDiv.addEventListener('click', function(e) {
    var btn = e.target.closest('.copy-btn');
    if (!btn) return;

    var wrapper = btn.closest('.code-block-wrapper');
    if (!wrapper) return;

    var code = wrapper.querySelector('code');
    if (!code) return;

    var text = code.textContent;

    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function() {
        showCopied(btn);
      }).catch(function() {
        fallbackCopy(text, btn);
      });
    } else {
      fallbackCopy(text, btn);
    }
  });
}

function fallbackCopy(text, btn) {
  var textarea = document.createElement('textarea');
  textarea.value = text;
  textarea.style.position = 'fixed';
  textarea.style.opacity = '0';
  document.body.appendChild(textarea);
  textarea.select();
  try {
    document.execCommand('copy');
    showCopied(btn);
  } catch (e) {
    /* silently fail */
  }
  document.body.removeChild(textarea);
}

function showCopied(btn) {
  var span = btn.querySelector('span');
  var origText = span.textContent;
  span.textContent = '已复制';
  btn.classList.add('copied');
  setTimeout(function() {
    span.textContent = origText;
    btn.classList.remove('copied');
  }, 2000);
}

/* ─── DOM Ready ──────────────────────────────── */

document.addEventListener('DOMContentLoaded', function() {
  var passwordInput = document.getElementById('password-input');
  var unlockBtn     = document.getElementById('unlock-btn');
  var lockError     = document.getElementById('lock-error');
  var hamburger     = document.getElementById('hamburger');
  var sidebar       = document.getElementById('sidebar');
  var overlay       = document.getElementById('overlay');

  /* ---- sessionStorage cache check ---- */
  var cachedValid   = sessionStorage.getItem('doc-key-valid');
  var cachedContent = sessionStorage.getItem('doc-content');
  if (cachedValid === 'true' && cachedContent) {
    renderApp(cachedContent);
    return;
  }

  /* ---- unlock handler ---- */
  async function handleUnlock() {
    var password = passwordInput.value;
    if (!password) {
      lockError.textContent = '请输入密码';
      lockError.style.display = 'block';
      return;
    }

    unlockBtn.disabled    = true;
    unlockBtn.textContent = '解密中...';
    lockError.style.display = 'none';

    try {
      if (!ENCRYPTED_CONTENT || !NONCE || !SALT) {
        throw new Error('加密数据缺失');
      }
      var plaintext = await decryptContent(ENCRYPTED_CONTENT, NONCE, SALT, password);

      try {
        sessionStorage.setItem('doc-key-valid', 'true');
        sessionStorage.setItem('doc-content', plaintext);
      } catch (e) { /* storage full — ignore */ }

      renderApp(plaintext);
    } catch (e) {
      lockError.textContent = '密码错误或数据损坏';
      lockError.style.display = 'block';
      unlockBtn.disabled    = false;
      unlockBtn.textContent = '解锁';
      passwordInput.value   = '';
      passwordInput.focus();
    }
  }

  unlockBtn.addEventListener('click', handleUnlock);
  passwordInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') handleUnlock();
  });

  /* ---- hamburger menu ---- */
  hamburger.addEventListener('click', function() {
    sidebar.classList.toggle('open');
    overlay.classList.toggle('visible');
  });

  overlay.addEventListener('click', function() {
    sidebar.classList.remove('open');
    overlay.classList.remove('visible');
  });

  passwordInput.focus();
});
</script>
</body>
